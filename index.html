<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">

  <title>ManiekAmp</title>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;

    }

    .container {
      padding: 30px 20px;
    }

    img {
      width: 120px;

    }

      font-size: 16px;
      max-width: 400px;
      margin: 10px auto 30px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      background: #00c853;
      color: white;
      font-size: 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #00a844;
    }

    .section {
      margin-top: 40px;
    }

    .lang {
      margin-top: 50px;

      color: #888;

      margin: 40px 0;

</head>

<body>

  <div class="container">

    <img src="logo.png" alt="ManiekAmp logo">

    <h1>🎧 ManiekAmp</h1>

    <a class="btn" href="app-debug.apk" download>
      📥 Pobierz APK
    </a>

    <div class="section">
      <p>

    <div class="section">
      <h2>🇬🇧 English</h2>
      <p>

      </p>
    </div>

    <div class="lang">
      Made with 🔥 by Maniek
    </div>

</body>
</html>
